<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Checklist</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #011B50;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px;
      color: #FFFFFF;
    }

    .back { align-self: flex-start; color: #B9C930; text-decoration: none; font-size: 0.9rem; margin-bottom: 20px; }

    h1 { font-size: 1.6rem; font-weight: 700; }
    .divider { width: 50px; height: 3px; background: #B9C930; margin: 10px 0 24px; border-radius: 2px; }

    .add-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 16px;
    }

    .add-row input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      color: #222;
    }

    .add-row button {
      background: #B9C930;
      color: #011B50;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
    }

    .meta {
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .meta .progress {
      font-size: 0.85rem;
      color: #D3D3D3;
    }

    .meta .actions {
      display: flex;
      gap: 10px;
    }

    .meta button {
      background: none;
      border: 1.5px solid #D3D3D3;
      color: #D3D3D3;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .meta button:active { opacity: 0.6; }

    .list {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item {
      background: #FFFFFF;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-left: 5px solid #B9C930;
      transition: opacity 0.2s;
    }

    .item.done {
      border-left-color: #D3D3D3;
      opacity: 0.6;
    }

    .item.done .label {
      text-decoration: line-through;
      color: #888;
    }

    .checkbox {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2.5px solid #B9C930;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .item.done .checkbox {
      background: #D3D3D3;
      border-color: #D3D3D3;
    }

    .checkbox::after {
      content: '';
    }

    .item.done .checkbox::after {
      content: '✓';
      font-size: 0.9rem;
      color: #FFFFFF;
      font-weight: 700;
    }

    .label {
      flex: 1;
      font-size: 1rem;
      color: #222;
      font-weight: 500;
    }

    .del-btn {
      background: none;
      border: none;
      color: #D3D3D3;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }
    .del-btn:active { color: #e55; }

    .empty {
      text-align: center;
      color: #D3D3D3;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .progress-bar-wrap {
      width: 100%;
      max-width: 420px;
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #B9C930;
      border-radius: 3px;
      transition: width 0.3s;
    }
  </style>
</head>
<body>

  <a class="back" href="index.html">← Home</a>
  <h1>Quick Checklist</h1>
  <div class="divider"></div>

  <div class="add-row">
    <input type="text" id="newItem" placeholder="Add an item…" onkeydown="if(event.key==='Enter') addItem()" />
    <button onclick="addItem()">+</button>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <div class="meta">
    <span class="progress" id="progressText">0 of 0 done</span>
    <div class="actions">
      <button onclick="resetAll()">Reset</button>
      <button onclick="clearDone()">Clear done</button>
    </div>
  </div>

  <div class="list" id="list"></div>

  <script>
    let items = JSON.parse(localStorage.getItem('checklist_items') || '[]');

    function save() {
      localStorage.setItem('checklist_items', JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const done = items.filter(i => i.done).length;
      const total = items.length;

      document.getElementById('progressText').textContent = `${done} of ${total} done`;
      document.getElementById('progressBar').style.width = total ? `${(done/total)*100}%` : '0%';

      if (!items.length) {
        list.innerHTML = '<div class="empty">No items yet — add one above</div>';
        return;
      }

      list.innerHTML = items.map((item, idx) => `
        <div class="item ${item.done ? 'done' : ''}" id="item-${idx}">
          <div class="checkbox" onclick="toggle(${idx})"></div>
          <span class="label">${escHtml(item.text)}</span>
          <button class="del-btn" onclick="remove(${idx})">✕</button>
        </div>
      `).join('');
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addItem() {
      const input = document.getElementById('newItem');
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, done: false });
      input.value = '';
      save(); render();
    }

    function toggle(idx) {
      items[idx].done = !items[idx].done;
      save(); render();
    }

    function remove(idx) {
      items.splice(idx, 1);
      save(); render();
    }

    function resetAll() {
      items.forEach(i => i.done = false);
      save(); render();
    }

    function clearDone() {
      items = items.filter(i => !i.done);
      save(); render();
    }

    render();
  </script>

</body>
</html>
