<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Morning Grid</title>
  <link rel="manifest" href="manifest-grid.json" />
  <meta name="theme-color" content="#F4F3EF" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Grid" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:         #F4F3EF;
      --surface:    #FFFFFF;
      --border:     #E6E4DF;
      --sep:        #EDECEA;
      --text:       #1C1B18;
      --text-muted: #A09C95;
      --text-done:  #C4C0B9;
      --pencil:     #8C887F;
      --danger:     #DC2626;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 560px;
      margin: 0 auto;
      overflow: hidden;
    }

    /* ── Compact top bar — minimal chrome so tiles get the screen ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: max(8px, env(safe-area-inset-top, 8px)) 16px 7px;
      flex-shrink: 0;
    }

    .back {
      display: inline-flex;
      align-items: center;
      color: var(--text-muted);
      text-decoration: none;
      flex-shrink: 0;
      padding: 2px;
    }

    .back svg { width: 8px; height: 13px; }

    .title-wrap {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .title {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
      flex-shrink: 0;
    }

    .date-sub {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .count {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .reset-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.76rem;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.04em;
      padding: 0;
      flex-shrink: 0;
    }

    .reset-btn:active { opacity: 0.4; }

    /* ── Progress (full-width hairline under the bar) ── */
    .prog-track {
      height: 2px;
      background: var(--border);
      overflow: hidden;
      flex-shrink: 0;
    }

    .prog-fill {
      height: 100%;
      background: var(--pencil);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── All-done banner ── */
    .banner {
      margin: 0 16px 8px;
      padding: 12px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: 0.01em;
      display: none;
      flex-shrink: 0;
    }

    /* ── Scrollable grid area ── */
    .list-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 16px 8px;
    }

    .section { transform-origin: center; }

    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.63rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: var(--text-muted);
      padding: 18px 2px 10px;
    }

    .section-label.first { padding-top: 8px; }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── The grid: pack as many tiles in view as possible ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px;
      margin-bottom: 6px;
    }

    .tile {
      position: relative;
      min-height: 64px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 400;
      line-height: 1.2;
      padding: 10px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.1s;
      overflow: hidden;
      word-break: break-word;
    }

    .tile:active { transform: scale(0.96); }

    .tile.is-done {
      background: var(--pencil);
      border-color: var(--pencil);
      color: var(--surface);
    }

    .tile-text { display: block; }

    /* Check badge, top-right, when done */
    .check {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 14px;
      height: 14px;
      opacity: 0;
      color: var(--surface);
      transform: scale(0.4);
      transition: opacity 0.18s, transform 0.18s;
    }

    .tile.is-done .check {
      opacity: 1;
      transform: scale(1);
    }

    /* The floating copy that follows the finger while dragging */
    .drag-clone {
      pointer-events: none;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      transform: scale(1.05);
      opacity: 0.95;
    }

    /* The original tile left behind in the grid while its clone is dragged */
    .drag-placeholder { opacity: 0.28; }

    /* Insertion indicator: a pencil bar on the side the item will drop */
    .tile.drop-before { box-shadow: -3px 0 0 0 var(--pencil); }
    .tile.drop-after  { box-shadow:  3px 0 0 0 var(--pencil); }

    .empty-msg {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 48px 0;
      letter-spacing: 0.01em;
    }

    /* ── Poof: a section vanishes once every tile in it is done ── */
    .section.poofing {
      animation: poof 0.45s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      pointer-events: none;
    }

    @keyframes poof {
      0%   { transform: scale(1);    opacity: 1; filter: blur(0); }
      35%  { transform: scale(1.04); opacity: 1; filter: blur(0); }
      100% { transform: scale(0.6);  opacity: 0; filter: blur(5px); }
    }

    /* ── Add task ── */
    .add-wrap {
      flex-shrink: 0;
      padding: 10px 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom, 16px));
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .add-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border-radius: 10px;
      padding: 4px 4px 4px 14px;
      border: 1px solid var(--border);
    }

    .add-inner input {
      flex: 1;
      background: none;
      border: none;
      font-size: 0.94rem;
      color: var(--text);
      outline: none;
      padding: 10px 0;
      font-family: inherit;
    }

    .add-inner input::placeholder { color: var(--text-muted); }

    .add-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--text);
      border: none;
      color: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    .add-btn:active { opacity: 0.55; }

    .version {
      text-align: center;
      font-size: 0.58rem;
      color: var(--text-done);
      letter-spacing: 0.05em;
      padding-top: 7px;
    }

    /* ── Edit modal ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(28, 27, 24, 0.42);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 24px;
    }

    .modal-backdrop.show { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 340px;
      padding: 20px;
    }

    .modal h2 {
      font-size: 0.63rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .modal input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 11px 12px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
    }

    .modal input:focus { border-color: var(--pencil); }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .modal-actions button {
      flex: 1;
      border: none;
      border-radius: 9px;
      padding: 11px 0;
      font-size: 0.88rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
    }

    .m-del {
      background: var(--surface);
      border: 1px solid var(--border) !important;
      color: var(--danger);
    }

    .m-save {
      background: var(--text);
      color: var(--bg);
    }

    .m-del:active, .m-save:active { opacity: 0.6; }
  </style>
</head>
<body>

  <div class="topbar">
    <a class="back" href="index.html" aria-label="Home">
      <svg viewBox="0 0 7 11" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6,1 1,5.5 6,10"/>
      </svg>
    </a>
    <div class="title-wrap">
      <span class="title">Morning</span>
      <span class="date-sub" id="dateSub"></span>
    </div>
    <span class="count" id="progLabel">0/0</span>
    <button class="reset-btn" onclick="resetToday()">Reset</button>
  </div>

  <div class="prog-track">
    <div class="prog-fill" id="progFill" style="width:0%"></div>
  </div>

  <div class="banner" id="banner">All done — have a good day.</div>

  <div class="list-scroll">
    <div id="taskList"></div>
  </div>

  <div class="add-wrap">
    <div class="add-inner">
      <input id="newTask" type="text" placeholder="Add a task…" autocomplete="off"
             onkeydown="if(event.key==='Enter') addTask()" />
      <button class="add-btn" onclick="addTask()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
             stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="7" y1="12" x2="7" y2="2"/>
          <line x1="2" y1="7" x2="12" y2="7"/>
        </svg>
      </button>
    </div>
    <div class="version" id="versionTag"></div>
  </div>

  <!-- Long-press (or right-click) a tile to edit/delete -->
  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <h2>Edit task</h2>
      <input id="editInput" type="text" autocomplete="off"
             onkeydown="if(event.key==='Enter') saveEdit(); if(event.key==='Escape') closeModal()" />
      <div class="modal-actions">
        <button class="m-del" onclick="deleteEditing()">Delete</button>
        <button class="m-save" onclick="saveEdit()">Save</button>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_TASKS = [
      { text: 'Water',                      group: null },
      { text: 'Coffee / reading time',      group: null },
      { text: 'Lucy?',                      group: null },
      { text: 'Breakfast — oats / burrito', group: null },
      { text: 'Dishwasher / minor tasks',   group: null },
      { text: 'Teeth / deo / gel',          group: null },
      { text: 'Meds / watch',               group: null },
      { text: 'Airpods case',               group: 'pack' },
      { text: 'Lunch',                      group: 'pack' },
      { text: 'Shirt',                      group: 'pack' },
      { text: 'Pants / belt',               group: 'pack' },
      { text: 'Shoes (work)',               group: 'pack' },
      { text: 'Work jacket',                group: 'pack' },
    ];

    const APP_VERSION = '1.4';
    const APP_UPDATED = '13 Jun 2026, 8:59 pm';

    // Separate storage from the list-style morning checklist — this is its own app.
    const TASKS_KEY = 'grid_tasks_v1';
    const STATE_KEY = 'grid_state_v1';

    // The "routine day" rolls over at noon (local time), so tasks ticked
    // the night before still count toward the next morning.
    const todayStr = () => {
      const d = new Date(Date.now() - 12 * 3600 * 1000);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    let tasks = JSON.parse(localStorage.getItem(TASKS_KEY) || JSON.stringify(DEFAULT_TASKS));
    let state = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');

    if (state.date !== todayStr()) {
      state = { date: todayStr(), done: new Array(tasks.length).fill(false) };
    }
    while (state.done.length < tasks.length) state.done.push(false);
    state.done = state.done.slice(0, tasks.length);

    function save() {
      localStorage.setItem(TASKS_KEY, JSON.stringify(tasks));
      localStorage.setItem(STATE_KEY, JSON.stringify(state));
    }

    function haptic(pattern) {
      if (navigator.vibrate) navigator.vibrate(pattern);
    }

    function playPencilScratch() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const sr = ctx.sampleRate;
        const n = Math.ceil(sr * 0.13);
        const buf = ctx.createBuffer(1, n, sr);
        const d = buf.getChannelData(0);
        for (let i = 0; i < n; i++) {
          const t = i / sr;
          const env = (1 - Math.exp(-t / 0.003)) * Math.exp(-t / 0.022);
          d[i] = (Math.random() * 2 - 1) * env;
        }
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const bp = ctx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 5500;
        bp.Q.value = 0.7;
        const g = ctx.createGain();
        g.gain.value = 0.9;
        src.connect(bp); bp.connect(g); g.connect(ctx.destination);
        src.start();
        setTimeout(() => ctx.close(), 400);
      } catch (e) {}
    }

    function toggle(idx) {
      state.done[idx] = !state.done[idx];
      if (state.done[idx]) {
        haptic([30, 20, 60]);
        playPencilScratch();
      } else {
        haptic([20]);
      }
      save(); render();
    }

    function resetToday() {
      state = { date: todayStr(), done: new Array(tasks.length).fill(false) };
      prevAllDone = { Prep: false, Pack: false };
      poofing = {};
      save(); render();
    }

    function addTask() {
      const input = document.getElementById('newTask');
      const text = input.value.trim();
      if (!text) return;
      tasks.push({ text, group: null });
      state.done.push(false);
      input.value = '';
      save(); render();
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Edit modal ────────────────────────────────────────────────────────
    let editingIdx = null;

    function openEdit(idx) {
      editingIdx = idx;
      const input = document.getElementById('editInput');
      input.value = tasks[idx].text;
      document.getElementById('modal').classList.add('show');
      setTimeout(() => { input.focus(); input.select(); }, 50);
    }

    function closeModal() {
      editingIdx = null;
      document.getElementById('modal').classList.remove('show');
    }

    function saveEdit() {
      if (editingIdx === null) return;
      const text = document.getElementById('editInput').value.trim();
      if (text) tasks[editingIdx].text = text;
      closeModal(); save(); render();
    }

    function deleteEditing() {
      if (editingIdx === null) return;
      const idx = editingIdx;
      tasks.splice(idx, 1);
      state.done.splice(idx, 1);
      closeModal(); save(); render();
    }

    // Tap modal backdrop (outside the card) to dismiss
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target.id === 'modal') closeModal();
    });

    const CHECK_SVG = `<svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

    const GROUPS = [
      { key: 'Prep', label: 'Prep', match: t => !t.group },
      { key: 'Pack', label: 'Pack', match: t => t.group === 'pack' },
    ];

    function groupItems(g) {
      return tasks.map((t, i) => ({ t, i })).filter(({ t }) => g.match(t));
    }

    // Whether each section was already fully complete on the previous render.
    // Initialised from current state so sections that are *already* done at
    // load are simply hidden (no poof) — the poof only plays on the transition.
    let prevAllDone = {};
    GROUPS.forEach(g => {
      const items = groupItems(g);
      prevAllDone[g.key] = items.length > 0 && items.every(({ i }) => state.done[i]);
    });
    let poofing = {};   // group key -> true while its poof animation is running

    let wasAllDone = false;

    function render() {
      document.getElementById('dateSub').textContent = new Date().toLocaleDateString('en-NZ', {
        weekday: 'short', month: 'short', day: 'numeric',
      });

      const doneCount = state.done.filter(Boolean).length;
      const total = tasks.length;
      document.getElementById('progLabel').textContent = `${doneCount}/${total}`;
      document.getElementById('progFill').style.width = total ? `${(doneCount / total) * 100}%` : '0%';

      const allDone = total > 0 && doneCount === total;
      if (allDone && !wasAllDone) haptic([40, 30, 40, 30, 120]);
      wasAllDone = allDone;
      document.getElementById('banner').style.display = allDone ? 'block' : 'none';

      let html = '';
      let isFirst = true;
      for (const g of GROUPS) {
        const items = groupItems(g);
        if (!items.length) { prevAllDone[g.key] = false; continue; }

        const groupDone = items.every(({ i }) => state.done[i]);

        // Already complete and the poof has finished → stay hidden.
        if (groupDone && prevAllDone[g.key] && !poofing[g.key]) continue;

        // Just transitioned to complete → play the poof, then re-render to drop it.
        const isPoof = groupDone && !prevAllDone[g.key];
        if (isPoof) {
          poofing[g.key] = true;
          haptic([40, 30, 80]);
          setTimeout(() => { poofing[g.key] = false; render(); }, 470);
        }

        html += `<div class="section${isPoof ? ' poofing' : ''}">`;
        html += `<div class="section-label${isFirst ? ' first' : ''}">${g.label}</div>`;
        html += `<div class="grid">`;
        for (const { t, i } of items) {
          const cls = `tile${state.done[i] ? ' is-done' : ''}`;
          html += `<button class="${cls}" data-idx="${i}">
            ${CHECK_SVG}
            <span class="tile-text">${escHtml(t.text)}</span>
          </button>`;
        }
        html += `</div></div>`;
        isFirst = false;

        prevAllDone[g.key] = groupDone;
      }

      if (!html && total === 0) html = '<div class="empty-msg">No tasks yet — add one below</div>';

      document.getElementById('taskList').innerHTML = html;
    }

    // ── Reorder: move a task within its section to a new position ─────────
    const taskGroup = i => tasks[i].group || null;
    const orderedIndices = g => tasks.map((t, i) => i).filter(i => taskGroup(i) === g);

    function reorder(fromIdx, targetIdx, after) {
      const group = taskGroup(fromIdx);
      let groupList = orderedIndices(group);
      const fromPos = groupList.indexOf(fromIdx);
      const targetPos = groupList.indexOf(targetIdx);
      let newPos = after ? targetPos + 1 : targetPos;
      groupList.splice(fromPos, 1);
      if (newPos > fromPos) newPos--;
      groupList.splice(newPos, 0, fromIdx);

      // Rebuild the flat arrays, keeping section display order (Prep, then Pack)
      // and the untouched section's existing order.
      const newOrder = [
        ...(group === null   ? groupList : orderedIndices(null)),
        ...(group === 'pack' ? groupList : orderedIndices('pack')),
      ];
      tasks = newOrder.map(i => tasks[i]);
      state.done = newOrder.map(i => state.done[i]);
      save(); render();
    }

    // ── Touch / click handling (delegated, attached once) ─────────────────
    // Tap → toggle. Press & hold → "pick up": then drag to reorder, or
    // release in place to edit. Right-click → edit (desktop).
    const listEl = document.getElementById('taskList');
    const HOLD_MS = 350;
    let touchInfo    = null;   // { idx, x, y, moved } before a tile is picked up
    let lpTimer      = null;
    let suppressClick = false;
    let drag         = null;   // active once a tile is picked up

    // Turn a held tile into a floating, finger-following clone.
    function pickUp(tile, idx, x, y) {
      const rect = tile.getBoundingClientRect();
      const clone = tile.cloneNode(true);
      clone.classList.add('drag-clone');
      clone.style.position = 'fixed';
      clone.style.margin = '0';
      clone.style.left = rect.left + 'px';
      clone.style.top = rect.top + 'px';
      clone.style.width = rect.width + 'px';
      clone.style.height = rect.height + 'px';
      document.body.appendChild(clone);
      tile.classList.add('drag-placeholder');
      drag = {
        idx, group: taskGroup(idx), el: tile, clone,
        offsetX: x - rect.left, offsetY: y - rect.top,
        startX: x, startY: y, moved: false,
        targetIdx: null, after: false,
      };
      haptic(45);
    }

    function dragMove(x, y) {
      drag.clone.style.left = (x - drag.offsetX) + 'px';
      drag.clone.style.top  = (y - drag.offsetY) + 'px';
      if (Math.abs(x - drag.startX) > 8 || Math.abs(y - drag.startY) > 8) drag.moved = true;

      document.querySelectorAll('.drop-before, .drop-after')
        .forEach(el => el.classList.remove('drop-before', 'drop-after'));
      drag.targetIdx = null;

      const under = document.elementFromPoint(x, y);
      const tile = under && under.closest('.tile');
      if (tile && tile !== drag.el) {
        const tIdx = parseInt(tile.dataset.idx);
        if (taskGroup(tIdx) === drag.group) {     // only reorder within a section
          const r = tile.getBoundingClientRect();
          const after = x > r.left + r.width / 2;
          tile.classList.add(after ? 'drop-after' : 'drop-before');
          drag.targetIdx = tIdx;
          drag.after = after;
        }
      }
    }

    function endDrag() {
      const d = drag;
      drag = null;
      d.clone.remove();
      d.el.classList.remove('drag-placeholder');
      document.querySelectorAll('.drop-before, .drop-after')
        .forEach(el => el.classList.remove('drop-before', 'drop-after'));
      suppressClick = true;
      setTimeout(() => { suppressClick = false; }, 400);

      if (d.targetIdx !== null && d.targetIdx !== d.idx) {
        haptic([20, 30, 40]);
        reorder(d.idx, d.targetIdx, d.after);
      } else if (!d.moved) {
        openEdit(d.idx);                          // held and let go without moving → edit
      }
    }

    listEl.addEventListener('touchstart', e => {
      const tile = e.target.closest('.tile');
      if (!tile) return;
      const idx = parseInt(tile.dataset.idx);
      const t = e.touches[0];
      touchInfo = { idx, tile, x: t.clientX, y: t.clientY, moved: false };
      clearTimeout(lpTimer);
      lpTimer = setTimeout(() => {
        if (!touchInfo || touchInfo.moved) return;
        const ti = touchInfo;
        touchInfo = null;
        pickUp(ti.tile, ti.idx, ti.x, ti.y);      // hold reached → pick the tile up
      }, HOLD_MS);
    }, { passive: true });

    // Non-passive so we can preventDefault (stop scrolling) while dragging.
    document.addEventListener('touchmove', e => {
      const t = e.touches[0];
      if (drag) { e.preventDefault(); dragMove(t.clientX, t.clientY); return; }
      if (!touchInfo) return;
      // Movement before the hold fires = a scroll/tap, not a pick-up.
      if (Math.abs(t.clientX - touchInfo.x) > 10 || Math.abs(t.clientY - touchInfo.y) > 10) {
        touchInfo.moved = true;
        clearTimeout(lpTimer);
      }
    }, { passive: false });

    document.addEventListener('touchend', () => {
      if (drag) { endDrag(); return; }
      clearTimeout(lpTimer);
      if (!touchInfo) return;
      const info = touchInfo;
      touchInfo = null;
      // A synthetic click follows touchend on some browsers — swallow it.
      suppressClick = true;
      setTimeout(() => { suppressClick = false; }, 400);
      if (info.moved) return;
      toggle(info.idx);                           // quick tap → toggle
    });

    document.addEventListener('touchcancel', () => {
      if (drag) { endDrag(); return; }
      clearTimeout(lpTimer);
      touchInfo = null;
    });

    listEl.addEventListener('click', e => {
      if (suppressClick) return;               // ignore the touch-synthesised click
      const tile = e.target.closest('.tile');
      if (!tile) return;
      toggle(parseInt(tile.dataset.idx));
    });

    listEl.addEventListener('contextmenu', e => {
      const tile = e.target.closest('.tile');
      if (!tile) return;
      e.preventDefault();
      openEdit(parseInt(tile.dataset.idx));
    });

    document.getElementById('versionTag').textContent = `v${APP_VERSION} · updated ${APP_UPDATED}`;

    render();
    scheduleNoonReset();

    function scheduleNoonReset() {
      const now = new Date();
      const next = new Date(now);
      next.setHours(12, 0, 0, 0);
      if (next <= now) next.setDate(next.getDate() + 1);
      setTimeout(() => { resetToday(); scheduleNoonReset(); }, next - now);
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>

</body>
</html>
