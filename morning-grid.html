<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Morning Grid</title>
  <link rel="manifest" href="manifest-grid.json" />
  <meta name="theme-color" content="#011B50" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Grid" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --blue:       #011B50;   /* Royal Blue Dark */
      --green:      #B9C930;   /* Acid Green */
      --gray:       #D3D3D3;   /* Light Gray */
      --ink:        #222222;   /* Eerie Black */
      --white:      #FFFFFF;
      --ink-muted:  #6B6F7A;
      --tile-bg:    #FFFFFF;
      --danger:     #B00020;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: var(--white);
      color: var(--ink);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 560px;
      margin: 0 auto;
      overflow: hidden;
    }

    /* ── Header (Royal Blue Dark banner, white text) ── */
    .header {
      background: var(--blue);
      color: var(--white);
      padding: max(16px, env(safe-area-inset-top, 16px)) 20px 14px;
      border-bottom: 3px solid var(--green);   /* Acid Green rule under heading */
      flex-shrink: 0;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.83rem;
      letter-spacing: 0.01em;
    }

    .back svg { width: 7px; height: 11px; }

    .reset-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.8);
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.04em;
      padding: 0;
    }

    .reset-btn:active { opacity: 0.4; }

    h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.6px;
      line-height: 1;
      color: var(--white);
    }

    .date-sub {
      font-size: 0.73rem;
      color: rgba(255,255,255,0.7);
      margin-top: 4px;
      letter-spacing: 0.01em;
    }

    /* ── Progress ── */
    .prog-wrap {
      padding: 12px 20px 8px;
      flex-shrink: 0;
    }

    .prog-track {
      height: 4px;
      background: var(--gray);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .prog-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .prog-label {
      font-size: 0.7rem;
      color: var(--ink-muted);
      letter-spacing: 0.03em;
    }

    /* ── All-done banner (Acid Green left-bar callout) ── */
    .banner {
      margin: 0 20px 8px;
      padding: 11px 16px;
      background: var(--white);
      border: 1px solid var(--gray);
      border-left: 4px solid var(--green);
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--blue);
      letter-spacing: 0.01em;
      display: none;
      flex-shrink: 0;
    }

    /* ── Scrollable grid area ── */
    .list-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 16px 8px;
    }

    .section-label {
      font-size: 0.63rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: var(--blue);
      padding: 16px 2px 8px;
      border-bottom: 2px solid var(--green);   /* Acid Green rule under heading */
      margin-bottom: 10px;
    }

    .section-label.first { padding-top: 6px; }

    /* ── The grid: pack as many tiles in view as possible ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px;
      margin-bottom: 6px;
    }

    .tile {
      position: relative;
      min-height: 64px;
      border: 1px solid var(--gray);
      border-radius: 12px;
      background: var(--tile-bg);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      line-height: 1.2;
      padding: 10px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
      overflow: hidden;
      word-break: break-word;
    }

    .tile:active { transform: scale(0.96); }

    .tile.is-done {
      background: var(--blue);
      border-color: var(--blue);
      color: var(--white);
    }

    .tile-text { display: block; }

    /* Acid Green check badge, top-right, when done */
    .check {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 14px;
      height: 14px;
      opacity: 0;
      color: var(--green);
      transform: scale(0.4);
      transition: opacity 0.15s, transform 0.15s;
    }

    .tile.is-done .check {
      opacity: 1;
      transform: scale(1);
    }

    .empty-msg {
      text-align: center;
      color: var(--ink-muted);
      font-size: 0.85rem;
      padding: 48px 0;
      letter-spacing: 0.01em;
    }

    /* ── Add task ── */
    .add-wrap {
      flex-shrink: 0;
      padding: 10px 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom, 16px));
      border-top: 1px solid var(--gray);
      background: var(--white);
    }

    .add-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--white);
      border-radius: 10px;
      padding: 4px 4px 4px 14px;
      border: 1px solid var(--gray);
    }

    .add-inner input {
      flex: 1;
      background: none;
      border: none;
      font-size: 0.94rem;
      color: var(--ink);
      outline: none;
      padding: 10px 0;
      font-family: inherit;
    }

    .add-inner input::placeholder { color: var(--ink-muted); }

    .add-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--blue);
      border: none;
      color: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    .add-btn:active { opacity: 0.55; }

    .version {
      text-align: center;
      font-size: 0.58rem;
      color: var(--ink-muted);
      letter-spacing: 0.05em;
      padding-top: 7px;
    }

    /* ── Edit modal ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(1, 27, 80, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 24px;
    }

    .modal-backdrop.show { display: flex; }

    .modal {
      background: var(--white);
      border-radius: 16px;
      width: 100%;
      max-width: 340px;
      padding: 20px;
      border-top: 4px solid var(--green);
    }

    .modal h2 {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: var(--blue);
      margin-bottom: 12px;
    }

    .modal input {
      width: 100%;
      border: 1px solid var(--gray);
      border-radius: 9px;
      padding: 11px 12px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--ink);
      outline: none;
    }

    .modal input:focus { border-color: var(--blue); }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .modal-actions button {
      flex: 1;
      border: none;
      border-radius: 9px;
      padding: 11px 0;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }

    .m-del {
      background: var(--white);
      border: 1px solid var(--gray) !important;
      color: var(--danger);
    }

    .m-save {
      background: var(--blue);
      color: var(--white);
    }

    .m-del:active, .m-save:active { opacity: 0.6; }
  </style>
</head>
<body>

  <div class="header">
    <div class="nav-row">
      <a class="back" href="index.html">
        <svg viewBox="0 0 7 11" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6,1 1,5.5 6,10"/>
        </svg>
        Home
      </a>
      <button class="reset-btn" onclick="resetToday()">Reset</button>
    </div>
    <h1>Morning</h1>
    <div class="date-sub" id="dateSub"></div>
  </div>

  <div class="prog-wrap">
    <div class="prog-track">
      <div class="prog-fill" id="progFill" style="width:0%"></div>
    </div>
    <div class="prog-label" id="progLabel">0 of 0 done</div>
  </div>

  <div class="banner" id="banner">All done — have a good day.</div>

  <div class="list-scroll">
    <div id="taskList"></div>
  </div>

  <div class="add-wrap">
    <div class="add-inner">
      <input id="newTask" type="text" placeholder="Add a task…" autocomplete="off"
             onkeydown="if(event.key==='Enter') addTask()" />
      <button class="add-btn" onclick="addTask()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
             stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="7" y1="12" x2="7" y2="2"/>
          <line x1="2" y1="7" x2="12" y2="7"/>
        </svg>
      </button>
    </div>
    <div class="version" id="versionTag"></div>
  </div>

  <!-- Long-press (or right-click) a tile to edit/delete -->
  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <h2>Edit task</h2>
      <input id="editInput" type="text" autocomplete="off"
             onkeydown="if(event.key==='Enter') saveEdit(); if(event.key==='Escape') closeModal()" />
      <div class="modal-actions">
        <button class="m-del" onclick="deleteEditing()">Delete</button>
        <button class="m-save" onclick="saveEdit()">Save</button>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_TASKS = [
      { text: 'Water',                      group: null },
      { text: 'Coffee / reading time',      group: null },
      { text: 'Lucy?',                      group: null },
      { text: 'Breakfast — oats / burrito', group: null },
      { text: 'Dishwasher / minor tasks',   group: null },
      { text: 'Teeth / deo / gel',          group: null },
      { text: 'Meds / watch',               group: null },
      { text: 'Airpods case',               group: 'pack' },
      { text: 'Lunch',                      group: 'pack' },
      { text: 'Shirt',                      group: 'pack' },
      { text: 'Pants / belt',               group: 'pack' },
      { text: 'Shoes (work)',               group: 'pack' },
      { text: 'Work jacket',                group: 'pack' },
    ];

    const APP_VERSION = '1.0';
    const APP_UPDATED = '13 Jun 2026, 8:11 pm';

    // Separate storage from the list-style morning checklist — this is its own app.
    const TASKS_KEY = 'grid_tasks_v1';
    const STATE_KEY = 'grid_state_v1';

    // The "routine day" rolls over at noon (local time), so tasks ticked
    // the night before still count toward the next morning.
    const todayStr = () => {
      const d = new Date(Date.now() - 12 * 3600 * 1000);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    let tasks = JSON.parse(localStorage.getItem(TASKS_KEY) || JSON.stringify(DEFAULT_TASKS));
    let state = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');

    if (state.date !== todayStr()) {
      state = { date: todayStr(), done: new Array(tasks.length).fill(false) };
    }
    while (state.done.length < tasks.length) state.done.push(false);
    state.done = state.done.slice(0, tasks.length);

    function save() {
      localStorage.setItem(TASKS_KEY, JSON.stringify(tasks));
      localStorage.setItem(STATE_KEY, JSON.stringify(state));
    }

    function haptic(pattern) {
      if (navigator.vibrate) navigator.vibrate(pattern);
    }

    function playPencilScratch() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const sr = ctx.sampleRate;
        const n = Math.ceil(sr * 0.13);
        const buf = ctx.createBuffer(1, n, sr);
        const d = buf.getChannelData(0);
        for (let i = 0; i < n; i++) {
          const t = i / sr;
          const env = (1 - Math.exp(-t / 0.003)) * Math.exp(-t / 0.022);
          d[i] = (Math.random() * 2 - 1) * env;
        }
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const bp = ctx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 5500;
        bp.Q.value = 0.7;
        const g = ctx.createGain();
        g.gain.value = 0.9;
        src.connect(bp); bp.connect(g); g.connect(ctx.destination);
        src.start();
        setTimeout(() => ctx.close(), 400);
      } catch (e) {}
    }

    function toggle(idx) {
      state.done[idx] = !state.done[idx];
      if (state.done[idx]) {
        haptic([30, 20, 60]);
        playPencilScratch();
      } else {
        haptic([20]);
      }
      save(); render();
    }

    function resetToday() { state = { date: todayStr(), done: new Array(tasks.length).fill(false) }; save(); render(); }

    function addTask() {
      const input = document.getElementById('newTask');
      const text = input.value.trim();
      if (!text) return;
      tasks.push({ text, group: null });
      state.done.push(false);
      input.value = '';
      save(); render();
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Edit modal ────────────────────────────────────────────────────────
    let editingIdx = null;

    function openEdit(idx) {
      editingIdx = idx;
      const input = document.getElementById('editInput');
      input.value = tasks[idx].text;
      document.getElementById('modal').classList.add('show');
      setTimeout(() => { input.focus(); input.select(); }, 50);
    }

    function closeModal() {
      editingIdx = null;
      document.getElementById('modal').classList.remove('show');
    }

    function saveEdit() {
      if (editingIdx === null) return;
      const text = document.getElementById('editInput').value.trim();
      if (text) tasks[editingIdx].text = text;
      closeModal(); save(); render();
    }

    function deleteEditing() {
      if (editingIdx === null) return;
      const idx = editingIdx;
      tasks.splice(idx, 1);
      state.done.splice(idx, 1);
      closeModal(); save(); render();
    }

    // Tap modal backdrop (outside the card) to dismiss
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target.id === 'modal') closeModal();
    });

    const CHECK_SVG = `<svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

    let wasAllDone = false;

    function render() {
      document.getElementById('dateSub').textContent = new Date().toLocaleDateString('en-NZ', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
      });

      const doneCount = state.done.filter(Boolean).length;
      const total = tasks.length;
      document.getElementById('progLabel').textContent = `${doneCount} of ${total} done`;
      document.getElementById('progFill').style.width = total ? `${(doneCount / total) * 100}%` : '0%';

      const allDone = total > 0 && doneCount === total;
      if (allDone && !wasAllDone) haptic([40, 30, 40, 30, 120]);
      wasAllDone = allDone;
      document.getElementById('banner').style.display = allDone ? 'block' : 'none';

      const groups = [
        { label: 'Prep', items: tasks.map((t, i) => ({ t, i })).filter(({ t }) => !t.group) },
        { label: 'Pack', items: tasks.map((t, i) => ({ t, i })).filter(({ t }) => t.group === 'pack') },
      ];

      let html = '';
      let isFirst = true;
      for (const g of groups) {
        if (!g.items.length) continue;
        html += `<div class="section-label${isFirst ? ' first' : ''}">${g.label}</div>`;
        isFirst = false;
        html += `<div class="grid">`;
        for (const { t, i } of g.items) {
          const cls = `tile${state.done[i] ? ' is-done' : ''}`;
          html += `<button class="${cls}" data-idx="${i}">
            ${CHECK_SVG}
            <span class="tile-text">${escHtml(t.text)}</span>
          </button>`;
        }
        html += `</div>`;
      }

      if (!html && total === 0) html = '<div class="empty-msg">No tasks yet — add one below</div>';

      document.getElementById('taskList').innerHTML = html;
    }

    // ── Touch / click handling (delegated, attached once) ─────────────────
    // Tap → toggle. Long-press (500ms) → edit. Right-click → edit (desktop).
    const listEl = document.getElementById('taskList');
    let touchInfo    = null;   // { idx, x, y, moved, longFired }
    let lpTimer      = null;
    let suppressClick = false;

    listEl.addEventListener('touchstart', e => {
      const tile = e.target.closest('.tile');
      if (!tile) return;
      const idx = parseInt(tile.dataset.idx);
      touchInfo = { idx, x: e.touches[0].clientX, y: e.touches[0].clientY, moved: false, longFired: false };
      clearTimeout(lpTimer);
      lpTimer = setTimeout(() => {
        if (!touchInfo || touchInfo.moved) return;
        touchInfo.longFired = true;
        haptic(40);
        openEdit(idx);
      }, 500);
    }, { passive: true });

    listEl.addEventListener('touchmove', e => {
      if (!touchInfo) return;
      const dx = Math.abs(e.touches[0].clientX - touchInfo.x);
      const dy = Math.abs(e.touches[0].clientY - touchInfo.y);
      if (dx > 12 || dy > 12) { touchInfo.moved = true; clearTimeout(lpTimer); }
    }, { passive: true });

    listEl.addEventListener('touchend', () => {
      clearTimeout(lpTimer);
      if (!touchInfo) return;
      const info = touchInfo;
      touchInfo = null;
      // A synthetic click follows touchend on some browsers — swallow it.
      suppressClick = true;
      setTimeout(() => { suppressClick = false; }, 400);
      if (info.longFired || info.moved) return;
      toggle(info.idx);
    });

    listEl.addEventListener('touchcancel', () => {
      clearTimeout(lpTimer);
      touchInfo = null;
    });

    listEl.addEventListener('click', e => {
      if (suppressClick) return;            // ignore the touch-synthesised click
      const tile = e.target.closest('.tile');
      if (!tile) return;
      toggle(parseInt(tile.dataset.idx));
    });

    listEl.addEventListener('contextmenu', e => {
      const tile = e.target.closest('.tile');
      if (!tile) return;
      e.preventDefault();
      openEdit(parseInt(tile.dataset.idx));
    });

    document.getElementById('versionTag').textContent = `v${APP_VERSION} · updated ${APP_UPDATED}`;

    render();
    scheduleNoonReset();

    function scheduleNoonReset() {
      const now = new Date();
      const next = new Date(now);
      next.setHours(12, 0, 0, 0);
      if (next <= now) next.setDate(next.getDate() + 1);
      setTimeout(() => { resetToday(); scheduleNoonReset(); }, next - now);
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>

</body>
</html>
