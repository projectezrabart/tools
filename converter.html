<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit Converter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #011B50;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px;
      color: #FFFFFF;
    }

    .back { align-self: flex-start; color: #B9C930; text-decoration: none; font-size: 0.9rem; margin-bottom: 20px; }

    h1 { font-size: 1.6rem; font-weight: 700; }
    .divider { width: 50px; height: 3px; background: #B9C930; margin: 10px 0 24px; border-radius: 2px; }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 24px;
      width: 100%;
      max-width: 400px;
    }

    .tab {
      padding: 8px 16px;
      border-radius: 20px;
      border: 2px solid #B9C930;
      background: transparent;
      color: #B9C930;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab.active, .tab:active {
      background: #B9C930;
      color: #011B50;
    }

    .card {
      background: #FFFFFF;
      border-radius: 12px;
      padding: 22px 20px;
      width: 100%;
      max-width: 400px;
      border-left: 5px solid #B9C930;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      margin-bottom: 14px;
    }

    .field { flex: 1; }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: #011B50;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    input[type="number"], select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #D3D3D3;
      border-radius: 8px;
      font-size: 1rem;
      color: #222222;
      background: #fff;
    }

    .swap-btn {
      background: #011B50;
      color: #B9C930;
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 1.2rem;
      cursor: pointer;
      flex-shrink: 0;
      align-self: flex-end;
      margin-bottom: 0;
      height: 42px;
    }

    .result {
      margin-top: 4px;
      background: #011B50;
      border-radius: 8px;
      padding: 14px 16px;
      text-align: center;
    }

    .result .value {
      font-size: 2rem;
      font-weight: 700;
      color: #B9C930;
      font-variant-numeric: tabular-nums;
    }

    .result .unit {
      font-size: 0.85rem;
      color: #D3D3D3;
      margin-top: 2px;
    }
  </style>
</head>
<body>

  <a class="back" href="index.html">← Home</a>
  <h1>Unit Converter</h1>
  <div class="divider"></div>

  <div class="tabs">
    <button class="tab active" onclick="setCategory('length')">Length</button>
    <button class="tab" onclick="setCategory('weight')">Weight</button>
    <button class="tab" onclick="setCategory('temp')">Temp</button>
    <button class="tab" onclick="setCategory('area')">Area</button>
  </div>

  <div class="card">
    <div class="row">
      <div class="field">
        <label>From</label>
        <select id="fromUnit" onchange="convert()"></select>
      </div>
      <button class="swap-btn" onclick="swapUnits()" title="Swap">⇄</button>
      <div class="field">
        <label>To</label>
        <select id="toUnit" onchange="convert()"></select>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Value</label>
        <input type="number" id="inputVal" value="1" oninput="convert()" />
      </div>
    </div>
    <div class="result">
      <div class="value" id="resultVal">—</div>
      <div class="unit" id="resultUnit"></div>
    </div>
  </div>

  <script>
    const CATEGORIES = {
      length: {
        units: ['mm','cm','m','km','in','ft','yd','mi'],
        toBase: { mm:0.001, cm:0.01, m:1, km:1000, in:0.0254, ft:0.3048, yd:0.9144, mi:1609.344 }
      },
      weight: {
        units: ['mg','g','kg','t','oz','lb','st'],
        toBase: { mg:0.000001, g:0.001, kg:1, t:1000, oz:0.028349523, lb:0.45359237, st:6.35029318 }
      },
      temp: {
        units: ['°C','°F','K'],
        toBase: null
      },
      area: {
        units: ['mm²','cm²','m²','ha','km²','in²','ft²','ac','mi²'],
        toBase: { 'mm²':0.000001,'cm²':0.0001,'m²':1,'ha':10000,'km²':1e6,'in²':0.00064516,'ft²':0.09290304,'ac':4046.8564,'mi²':2589988.11 }
      }
    };

    let category = 'length';

    function setCategory(cat) {
      category = cat;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      populateSelects();
      convert();
    }

    function populateSelects() {
      const { units } = CATEGORIES[category];
      ['fromUnit','toUnit'].forEach((id, i) => {
        const sel = document.getElementById(id);
        sel.innerHTML = units.map(u => `<option value="${u}">${u}</option>`).join('');
        sel.selectedIndex = i === 1 ? 1 : 0;
      });
    }

    function convertTemp(val, from, to) {
      let c;
      if (from === '°C') c = val;
      else if (from === '°F') c = (val - 32) * 5/9;
      else c = val - 273.15;
      if (to === '°C') return c;
      if (to === '°F') return c * 9/5 + 32;
      return c + 273.15;
    }

    function convert() {
      const from = document.getElementById('fromUnit').value;
      const to   = document.getElementById('toUnit').value;
      const val  = parseFloat(document.getElementById('inputVal').value);

      if (isNaN(val)) { document.getElementById('resultVal').textContent = '—'; return; }

      let result;
      if (category === 'temp') {
        result = convertTemp(val, from, to);
      } else {
        const { toBase } = CATEGORIES[category];
        result = val * toBase[from] / toBase[to];
      }

      const formatted = Math.abs(result) >= 1000
        ? result.toLocaleString('en-NZ', { maximumFractionDigits: 4 })
        : parseFloat(result.toPrecision(6)).toString();

      document.getElementById('resultVal').textContent = formatted;
      document.getElementById('resultUnit').textContent = `${val} ${from} = ${formatted} ${to}`;
    }

    function swapUnits() {
      const f = document.getElementById('fromUnit');
      const t = document.getElementById('toUnit');
      [f.value, t.value] = [t.value, f.value];
      convert();
    }

    populateSelects();
    convert();
  </script>

</body>
</html>
