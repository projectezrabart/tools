<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ezra's Tools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #011B50;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      color: #FFFFFF;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      color: #B9C930;
      margin-top: 6px;
      font-size: 0.95rem;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: #B9C930;
      margin: 16px auto 0;
      border-radius: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: #FFFFFF;
      border-radius: 12px;
      padding: 24px 20px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 18px;
      border-left: 5px solid #B9C930;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .card:active {
      transform: scale(0.97);
    }

    .card .icon {
      font-size: 2rem;
      flex-shrink: 0;
    }

    .card .text h2 {
      color: #011B50;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .card .text p {
      color: #555;
      font-size: 0.85rem;
      margin-top: 3px;
    }

    footer {
      margin-top: 48px;
      color: #D3D3D3;
      font-size: 0.75rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <h1>Ezra's Tools</h1>
    <p>Quick-access web apps</p>
    <div class="divider"></div>
  </header>

  <div class="grid">
    <a class="card" href="timer.html">
      <div class="icon">⏱️</div>
      <div class="text">
        <h2>Interval Timer</h2>
        <p>Configurable work / rest countdown timer</p>
      </div>
    </a>

    <a class="card" href="converter.html">
      <div class="icon">📐</div>
      <div class="text">
        <h2>Unit Converter</h2>
        <p>Length, weight, temperature, area</p>
      </div>
    </a>

    <a class="card" href="checklist.html">
      <div class="icon">✅</div>
      <div class="text">
        <h2>Quick Checklist</h2>
        <p>Reusable tap-to-check task list</p>
      </div>
    </a>
  </div>

  <footer>Add new tools by dropping HTML files here and linking from this page.</footer>

</body>
</html>
