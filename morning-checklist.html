<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morning Checklist</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #011B50;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px;
      color: #FFFFFF;
    }

    .back { align-self: flex-start; color: #B9C930; text-decoration: none; font-size: 0.9rem; margin-bottom: 20px; }

    h1 { font-size: 1.6rem; font-weight: 700; }
    .divider { width: 50px; height: 3px; background: #B9C930; margin: 10px 0 6px; border-radius: 2px; }

    .date-label {
      font-size: 0.85rem;
      color: #B9C930;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }

    .add-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 16px;
    }

    .add-row input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      color: #222;
    }

    .add-row button {
      background: #B9C930;
      color: #011B50;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
    }

    .progress-bar-wrap {
      width: 100%;
      max-width: 420px;
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #B9C930;
      border-radius: 3px;
      transition: width 0.3s;
    }

    .meta {
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .meta .progress {
      font-size: 0.85rem;
      color: #D3D3D3;
    }

    .meta button {
      background: none;
      border: 1.5px solid #D3D3D3;
      color: #D3D3D3;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .meta button:active { opacity: 0.6; }

    .list {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item {
      background: #FFFFFF;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-left: 5px solid #B9C930;
      transition: opacity 0.2s;
    }

    .item.done {
      border-left-color: #D3D3D3;
      opacity: 0.6;
    }

    .item.done .label {
      text-decoration: line-through;
      color: #888;
    }

    .checkbox {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2.5px solid #B9C930;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .item.done .checkbox {
      background: #D3D3D3;
      border-color: #D3D3D3;
    }

    .item.done .checkbox::after {
      content: '✓';
      font-size: 0.9rem;
      color: #FFFFFF;
      font-weight: 700;
    }

    .label {
      flex: 1;
      font-size: 1rem;
      color: #222;
      font-weight: 500;
    }

    .del-btn {
      background: none;
      border: none;
      color: #D3D3D3;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }
    .del-btn:active { color: #e55; }

    .empty {
      text-align: center;
      color: #D3D3D3;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .complete-banner {
      width: 100%;
      max-width: 420px;
      background: #B9C930;
      color: #011B50;
      border-radius: 10px;
      padding: 14px 18px;
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
      margin-bottom: 12px;
      display: none;
    }

    .reset-note {
      margin-top: 28px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body>

  <a class="back" href="index.html">← Home</a>
  <h1>Morning Checklist</h1>
  <div class="divider"></div>
  <div class="date-label" id="dateLabel"></div>

  <div class="add-row">
    <input type="text" id="newTask" placeholder="Add a task…" onkeydown="if(event.key==='Enter') addTask()" />
    <button onclick="addTask()">+</button>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <div class="meta">
    <span class="progress" id="progressText">0 of 0 done</span>
    <button onclick="resetToday()">Reset today</button>
  </div>

  <div class="complete-banner" id="completeBanner">All done — great start to the day!</div>

  <div class="list" id="list"></div>

  <div class="reset-note">Resets automatically each day</div>

  <script>
    const DEFAULT_TASKS = [
      'Check emails',
      'Review today\'s calendar',
      'Check team messages',
      'Review priority tasks for the day',
    ];

    function todayStr() {
      return new Date().toISOString().slice(0, 10);
    }

    let tasks = JSON.parse(localStorage.getItem('morning_tasks') || JSON.stringify(DEFAULT_TASKS));
    let state = JSON.parse(localStorage.getItem('morning_state') || '{}');

    // Auto-reset if it's a new day
    if (state.date !== todayStr()) {
      state = { date: todayStr(), done: new Array(tasks.length).fill(false) };
      saveFull();
    }

    // Sync done array length with tasks length
    while (state.done.length < tasks.length) state.done.push(false);
    state.done = state.done.slice(0, tasks.length);

    function saveFull() {
      localStorage.setItem('morning_tasks', JSON.stringify(tasks));
      localStorage.setItem('morning_state', JSON.stringify(state));
    }

    function toggle(idx) {
      state.done[idx] = !state.done[idx];
      saveFull(); render();
    }

    function addTask() {
      const input = document.getElementById('newTask');
      const text = input.value.trim();
      if (!text) return;
      tasks.push(text);
      state.done.push(false);
      input.value = '';
      saveFull(); render();
    }

    function removeTask(idx) {
      tasks.splice(idx, 1);
      state.done.splice(idx, 1);
      saveFull(); render();
    }

    function resetToday() {
      state.done = new Array(tasks.length).fill(false);
      saveFull(); render();
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function render() {
      const done = state.done.filter(Boolean).length;
      const total = tasks.length;

      document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-NZ', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });

      document.getElementById('progressText').textContent = `${done} of ${total} done`;
      document.getElementById('progressBar').style.width = total ? `${(done / total) * 100}%` : '0%';

      const banner = document.getElementById('completeBanner');
      banner.style.display = (total > 0 && done === total) ? 'block' : 'none';

      const list = document.getElementById('list');
      if (!tasks.length) {
        list.innerHTML = '<div class="empty">No tasks yet — add one above</div>';
        return;
      }

      list.innerHTML = tasks.map((task, idx) => `
        <div class="item ${state.done[idx] ? 'done' : ''}">
          <div class="checkbox" onclick="toggle(${idx})"></div>
          <span class="label">${escHtml(task)}</span>
          <button class="del-btn" onclick="removeTask(${idx})">✕</button>
        </div>
      `).join('');
    }

    render();
  </script>

</body>
</html>
