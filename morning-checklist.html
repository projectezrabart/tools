<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Morning</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#F4F3EF" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Morning" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:         #F4F3EF;
      --surface:    #FFFFFF;
      --border:     #E6E4DF;
      --sep:        #EDECEA;
      --text:       #1C1B18;
      --text-muted: #A09C95;
      --text-done:  #C4C0B9;
      --pencil:     #8C887F;
      --danger:     #DC2626;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: max(18px, env(safe-area-inset-top, 18px)) 22px 8px;
      flex-shrink: 0;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.83rem;
      letter-spacing: 0.01em;
    }

    .back svg { width: 7px; height: 11px; }

    .reset-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.04em;
      padding: 0;
    }

    .reset-btn:active { opacity: 0.4; }

    h1 {
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: -0.6px;
      line-height: 1;
      color: var(--text);
    }

    .date-sub {
      font-size: 0.73rem;
      color: var(--text-muted);
      margin-top: 3px;
      letter-spacing: 0.01em;
    }

    /* ── Progress ── */
    .prog-wrap {
      padding: 10px 22px 10px;
      flex-shrink: 0;
    }

    .prog-track {
      height: 1px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .prog-fill {
      height: 100%;
      background: var(--pencil);
      border-radius: 1px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .prog-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    /* ── All-done banner ── */
    .banner {
      margin: 0 16px 8px;
      padding: 12px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: 0.01em;
      display: none;
      flex-shrink: 0;
    }

    /* ── Scrollable task list ── */
    .list-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 16px 8px;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.63rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: var(--text-muted);
      padding: 20px 2px 10px;
    }

    .section-label.first { padding-top: 10px; }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Swipe-to-delete wrapper ── */
    .swipe-wrap {
      position: relative;
      border-radius: 10px;
      margin-bottom: 3px;
      overflow: hidden;
    }

    .swipe-delete {
      position: absolute;
      inset: 0;
      background: var(--danger);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 22px;
      gap: 6px;
      color: white;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      pointer-events: none;
    }

    /* ── Task item ── */
    .task {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 12px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      user-select: none;
      -webkit-user-select: none;
      transition: opacity 0.2s;
      cursor: pointer;
      will-change: transform;
    }

    .task.is-done { border-color: var(--sep); }

    /* Dragging: lift the whole wrap so the red delete layer moves with it */
    .swipe-wrap.dragging {
      z-index: 10;
      overflow: visible;
    }

    .swipe-wrap.dragging .swipe-delete { display: none; }

    .swipe-wrap.dragging .task {
      box-shadow: 0 8px 24px rgba(0,0,0,0.16);
      border-color: var(--pencil);
      transform: scale(1.02);
    }

    /* Drop indicator: line above the target row (box-shadow isn't clipped) */
    .swipe-wrap.drop-above {
      box-shadow: 0 -3px 0 0 var(--pencil);
    }

    /* Grip */
    .grip {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 3.5px;
      padding: 4px 3px;
      cursor: grab;
      touch-action: none;
      opacity: 0.22;
    }

    .grip span {
      display: block;
      width: 13px;
      height: 1px;
      background: var(--text);
      border-radius: 0.5px;
    }

    .task.is-done .grip { visibility: hidden; }

    /* Checkbox */
    .check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }

    .task.is-done .check {
      background: var(--pencil);
      border-color: var(--pencil);
    }

    .check-mark { display: none; }

    /* Task text + animated strikethrough */
    .task-text {
      flex: 1;
      font-size: 0.94rem;
      font-weight: 400;
      color: var(--text);
      position: relative;
    }

    .task.is-done .task-text { color: var(--text-done); }

    .task.is-done .task-text::after {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 50%;
      height: 1px;
      background: var(--pencil);
      transform: scaleX(1);
      transform-origin: left center;
    }

    .task.just-done .task-text::after {
      animation: scratch-through 0.2s ease-out forwards;
    }

    @keyframes scratch-through {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    /* Delete button (desktop) */
    .del {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.82rem;
      cursor: pointer;
      padding: 4px 6px;
      opacity: 0;
      transition: opacity 0.15s;
      flex-shrink: 0;
      border-radius: 4px;
    }

    .task:hover .del,
    .task:active .del { opacity: 1; }

    /* Inline edit */
    .task.editing { border-color: var(--pencil); }

    .edit-input {
      flex: 1;
      background: none;
      border: none;
      font-size: 0.94rem;
      font-weight: 400;
      color: var(--text);
      outline: none;
      font-family: inherit;
      padding: 2px 0;
      min-width: 0;
    }

    .empty-msg {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 48px 0;
      letter-spacing: 0.01em;
    }

    /* ── Add task ── */
    .add-wrap {
      flex-shrink: 0;
      padding: 10px 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom, 16px));
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .add-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border-radius: 10px;
      padding: 4px 4px 4px 14px;
      border: 1px solid var(--border);
    }

    .add-inner input {
      flex: 1;
      background: none;
      border: none;
      font-size: 0.94rem;
      color: var(--text);
      outline: none;
      padding: 10px 0;
      font-family: inherit;
    }

    .add-inner input::placeholder { color: var(--text-muted); }

    .add-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--text);
      border: none;
      color: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    .add-btn:active { opacity: 0.55; }
  </style>
</head>
<body>

  <div class="header">
    <div class="nav-row">
      <a class="back" href="index.html">
        <svg viewBox="0 0 7 11" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6,1 1,5.5 6,10"/>
        </svg>
        Home
      </a>
      <button class="reset-btn" onclick="resetToday()">Reset</button>
    </div>
    <h1>Morning</h1>
    <div class="date-sub" id="dateSub"></div>
  </div>

  <div class="prog-wrap">
    <div class="prog-track">
      <div class="prog-fill" id="progFill" style="width:0%"></div>
    </div>
    <div class="prog-label" id="progLabel">0 of 0 done</div>
  </div>

  <div class="banner" id="banner">All done — have a good day.</div>

  <div class="list-scroll">
    <div id="taskList"></div>
  </div>

  <div class="add-wrap">
    <div class="add-inner">
      <input id="newTask" type="text" placeholder="Add a task…" autocomplete="off"
             onkeydown="if(event.key==='Enter') addTask()" />
      <button class="add-btn" onclick="addTask()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
             stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="7" y1="12" x2="7" y2="2"/>
          <line x1="2" y1="7" x2="12" y2="7"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const DEFAULT_TASKS = [
      { text: 'Water',                      group: null },
      { text: 'Coffee / reading time',      group: null },
      { text: 'Lucy?',                      group: null },
      { text: 'Breakfast — oats / burrito', group: null },
      { text: 'Dishwasher / minor tasks',   group: null },
      { text: 'Teeth / deo / gel',          group: null },
      { text: 'Meds / watch',               group: null },
      { text: 'Airpods case',               group: 'pack' },
      { text: 'Lunch',                      group: 'pack' },
      { text: 'Shirt',                      group: 'pack' },
      { text: 'Pants / belt',               group: 'pack' },
      { text: 'Shoes (work)',               group: 'pack' },
      { text: 'Work jacket',                group: 'pack' },
    ];

    const TASKS_KEY = 'morning_tasks_v3';
    const STATE_KEY = 'morning_state_v3';

    const todayStr = () => new Date().toISOString().slice(0, 10);

    let tasks = JSON.parse(localStorage.getItem(TASKS_KEY) || JSON.stringify(DEFAULT_TASKS));
    let state = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');

    if (state.date !== todayStr()) {
      state = { date: todayStr(), done: new Array(tasks.length).fill(false) };
    }
    while (state.done.length < tasks.length) state.done.push(false);
    state.done = state.done.slice(0, tasks.length);

    function save() {
      localStorage.setItem(TASKS_KEY, JSON.stringify(tasks));
      localStorage.setItem(STATE_KEY, JSON.stringify(state));
    }

    function haptic(pattern) {
      if (navigator.vibrate) navigator.vibrate(pattern);
    }

    function playPencilScratch() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const sr = ctx.sampleRate;
        const n = Math.ceil(sr * 0.13);
        const buf = ctx.createBuffer(1, n, sr);
        const d = buf.getChannelData(0);
        for (let i = 0; i < n; i++) {
          const t = i / sr;
          const env = (1 - Math.exp(-t / 0.003)) * Math.exp(-t / 0.022);
          d[i] = (Math.random() * 2 - 1) * env;
        }
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const bp = ctx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 5500;
        bp.Q.value = 0.7;
        const g = ctx.createGain();
        g.gain.value = 0.9;
        src.connect(bp); bp.connect(g); g.connect(ctx.destination);
        src.start();
        setTimeout(() => ctx.close(), 400);
      } catch (e) {}
    }

    let lastToggledIdx = null;

    function toggle(idx) {
      state.done[idx] = !state.done[idx];
      if (state.done[idx]) {
        haptic([30, 20, 60]);
        playPencilScratch();
        lastToggledIdx = idx;
      } else {
        haptic([20]);
        lastToggledIdx = null;
      }
      save(); render();
      lastToggledIdx = null;
    }

    function resetToday() { state.done = new Array(tasks.length).fill(false); save(); render(); }

    function addTask() {
      const input = document.getElementById('newTask');
      const text = input.value.trim();
      if (!text) return;
      tasks.push({ text, group: null });
      state.done.push(false);
      input.value = '';
      save(); render();
    }

    function removeTask(idx) {
      tasks.splice(idx, 1);
      state.done.splice(idx, 1);
      save(); render();
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function escAttr(s) {
      return escHtml(s).replace(/"/g,'&quot;');
    }

    // ── Inline edit ───────────────────────────────────────────────────────
    let editingIdx = null;

    function startEdit(idx) {
      editingIdx = idx; render();
      const input = document.getElementById('edit-input');
      if (input) { input.focus(); input.select(); }
    }

    function commitEdit(idx) {
      const input = document.getElementById('edit-input');
      if (!input) return;
      const text = input.value.trim();
      if (text) tasks[idx].text = text;
      editingIdx = null; save(); render();
    }

    function cancelEdit() { editingIdx = null; render(); }

    function handleEditKey(e, idx) {
      if (e.key === 'Enter') { e.preventDefault(); commitEdit(idx); }
      if (e.key === 'Escape') cancelEdit();
    }

    const TRASH_ICON = `<svg width="12" height="13" viewBox="0 0 24 24" fill="none" stroke="white"
      stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14H6L5 6"/>
      <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
    </svg>`;

    function taskHtml(t, i, isDone) {
      const grip = `<span class="grip"><span></span><span></span><span></span></span>`;
      const justDone = isDone && i === lastToggledIdx;

      if (editingIdx === i) {
        return `<div class="swipe-wrap"><div class="task editing" data-idx="${i}" data-group="${t.group || 'prep'}">
          ${grip}
          <input class="edit-input" id="edit-input" value="${escAttr(t.text)}"
                 onkeydown="handleEditKey(event,${i})" onblur="commitEdit(${i})" />
        </div></div>`;
      }
      const cls = `task${isDone ? ' is-done' : ''}${justDone ? ' just-done' : ''}`;
      return `<div class="swipe-wrap">
        <div class="swipe-delete">${TRASH_ICON} Delete</div>
        <div class="${cls}" data-idx="${i}" data-group="${t.group || 'prep'}">
          ${grip}
          <div class="check"><span class="check-mark"></span></div>
          <span class="task-text">${escHtml(t.text)}</span>
          <button class="del" onclick="event.stopPropagation();removeTask(${i})">✕</button>
        </div>
      </div>`;
    }

    let wasAllDone = false;

    function render() {
      document.getElementById('dateSub').textContent = new Date().toLocaleDateString('en-NZ', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
      });

      const doneCount = state.done.filter(Boolean).length;
      const total = tasks.length;
      document.getElementById('progLabel').textContent = `${doneCount} of ${total} done`;
      document.getElementById('progFill').style.width = total ? `${(doneCount / total) * 100}%` : '0%';

      const prepItems = tasks.map((t, i) => ({ t, i })).filter(({ t }) => !t.group);
      const packItems = tasks.map((t, i) => ({ t, i })).filter(({ t }) => t.group === 'pack');

      const prepAllDone = prepItems.length > 0 && prepItems.every(({ i }) => state.done[i]);
      const packAllDone = packItems.length > 0 && packItems.every(({ i }) => state.done[i]);
      const allDone = (prepItems.length === 0 || prepAllDone) && (packItems.length === 0 || packAllDone);

      if (total > 0 && allDone && !wasAllDone) haptic([40, 30, 40, 30, 120]);
      wasAllDone = allDone;

      document.getElementById('banner').style.display = (total > 0 && allDone) ? 'block' : 'none';

      let html = '';
      let isFirst = true;

      if (prepItems.length && !prepAllDone) {
        html += `<div class="section-label${isFirst ? ' first' : ''}">Prep</div>`;
        isFirst = false;
        prepItems.filter(({ i }) => !state.done[i]).forEach(({ t, i }) => { html += taskHtml(t, i, false); });
        prepItems.filter(({ i }) =>  state.done[i]).forEach(({ t, i }) => { html += taskHtml(t, i, true);  });
      }

      if (packItems.length && !packAllDone) {
        html += `<div class="section-label${isFirst ? ' first' : ''}">Pack</div>`;
        isFirst = false;
        packItems.filter(({ i }) => !state.done[i]).forEach(({ t, i }) => { html += taskHtml(t, i, false); });
        packItems.filter(({ i }) =>  state.done[i]).forEach(({ t, i }) => { html += taskHtml(t, i, true);  });
      }

      if (!html && total === 0) html = '<div class="empty-msg">No tasks yet — add one below</div>';

      document.getElementById('taskList').innerHTML = html;
      initDrag();
    }

    // ── Touch: drag + tap + long-press + swipe-delete ─────────────────────
    let drag           = null;
    let tapTrack       = null;
    let swipeTrack     = null;
    let longPressTimer = null;
    let isLongPress    = false;

    function initDrag() {
      document.querySelectorAll('.task:not(.is-done):not(.editing) .grip').forEach(grip => {
        grip.addEventListener('touchstart', onDragStart, { passive: false });
      });

      document.querySelectorAll('.task').forEach(task => {
        const idx = parseInt(task.dataset.idx);

        task.addEventListener('touchstart', e => {
          if (drag || e.target.closest('.grip') || e.target.closest('.del') || e.target.closest('.edit-input')) return;
          tapTrack = { x: e.touches[0].clientX, y: e.touches[0].clientY, idx };
          if (longPressTimer) clearTimeout(longPressTimer);
          longPressTimer = setTimeout(() => {
            longPressTimer = null;
            isLongPress = true;
            tapTrack = null;
            haptic(40);
            startEdit(idx);
          }, 500);
        }, { passive: true });

        task.addEventListener('click', e => {
          if (e.target.closest('.grip') || e.target.closest('.del') || e.target.closest('.edit-input')) return;
          toggle(idx);
        });
      });
    }

    function onDragStart(e) {
      e.preventDefault();
      const el = e.currentTarget.closest('.task');
      const wrap = el.closest('.swipe-wrap');
      drag = {
        el,
        wrap,
        fromIdx: parseInt(el.dataset.idx),
        group: el.dataset.group,
        startY: e.touches[0].clientY,
        dropIdx: null,
      };
      wrap.classList.add('dragging');
    }

    document.addEventListener('touchmove', e => {
      if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }

      if (tapTrack && !swipeTrack && !drag) {
        const touch = e.touches[0];
        const dx = touch.clientX - tapTrack.x;
        const dy = touch.clientY - tapTrack.y;
        const adx = Math.abs(dx);
        const ady = Math.abs(dy);
        if (adx > 15 && adx > ady * 1.5 && dx < 0) {
          const taskEl = document.querySelector(`.task[data-idx="${tapTrack.idx}"]`);
          if (taskEl && !taskEl.classList.contains('editing')) {
            swipeTrack = { el: taskEl, idx: tapTrack.idx, startX: tapTrack.x, currentX: 0 };
            tapTrack = null;
          }
        } else if (ady > 15) {
          tapTrack = null;
        }
      }

      if (swipeTrack) {
        e.preventDefault();
        const dx = Math.min(0, e.touches[0].clientX - swipeTrack.startX);
        swipeTrack.currentX = dx;
        swipeTrack.el.style.transition = 'none';
        swipeTrack.el.style.transform = `translateX(${dx}px)`;
        return;
      }

      if (!drag) return;
      e.preventDefault();

      const curY = e.touches[0].clientY;
      drag.wrap.style.transform = `translateY(${curY - drag.startY}px)`;

      const peers = [...document.querySelectorAll(
        `.task[data-group="${drag.group}"]:not(.is-done)`
      )].filter(el => el !== drag.el);
      document.querySelectorAll('.drop-above').forEach(el => el.classList.remove('drop-above'));
      drag.dropIdx = null;
      for (const el of peers) {
        const r = el.getBoundingClientRect();
        if (curY < r.top + r.height / 2) {
          el.closest('.swipe-wrap').classList.add('drop-above');
          drag.dropIdx = parseInt(el.dataset.idx);
          break;
        }
      }
    }, { passive: false });

    document.addEventListener('touchend', e => {
      if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }

      if (swipeTrack) {
        if (Math.abs(swipeTrack.currentX) > 100) {
          const idxToDelete = swipeTrack.idx;
          swipeTrack.el.style.transition = 'transform 0.2s ease-in';
          swipeTrack.el.style.transform = 'translateX(-110%)';
          haptic([40, 30, 80]);
          swipeTrack = null;
          setTimeout(() => removeTask(idxToDelete), 200);
        } else {
          swipeTrack.el.style.transition = 'transform 0.35s cubic-bezier(0.34,1.56,0.64,1)';
          swipeTrack.el.style.transform = 'translateX(0)';
          swipeTrack = null;
        }
        return;
      }

      if (drag) {
        const { wrap, fromIdx, dropIdx } = drag;
        drag = null;
        wrap.style.transform = '';
        wrap.classList.remove('dragging');
        document.querySelectorAll('.drop-above').forEach(el => el.classList.remove('drop-above'));

        const [taskItem] = tasks.splice(fromIdx, 1);
        const [doneItem] = state.done.splice(fromIdx, 1);

        if (dropIdx === null) {
          let insertPos = tasks.length;
          for (let i = tasks.length - 1; i >= 0; i--) {
            if (!state.done[i] && (tasks[i].group || 'prep') === (taskItem.group || 'prep')) {
              insertPos = i + 1; break;
            }
          }
          tasks.splice(insertPos, 0, taskItem);
          state.done.splice(insertPos, 0, doneItem);
        } else {
          const adjusted = dropIdx > fromIdx ? dropIdx - 1 : dropIdx;
          tasks.splice(adjusted, 0, taskItem);
          state.done.splice(adjusted, 0, doneItem);
        }
        save(); render(); return;
      }

      if (isLongPress) { isLongPress = false; tapTrack = null; return; }
      if (!tapTrack) return;
      const tt = tapTrack;
      tapTrack = null;
      const touch = e.changedTouches[0];
      if (!touch) return;
      if (Math.abs(touch.clientX - tt.x) > 8 || Math.abs(touch.clientY - tt.y) > 8) return;
      e.preventDefault();
      toggle(tt.idx);
    });

    render();
    scheduleMidnightReset();

    function scheduleMidnightReset() {
      const now = new Date();
      const midnight = new Date(now);
      midnight.setDate(midnight.getDate() + 1);
      midnight.setHours(0, 0, 0, 0);
      setTimeout(() => { resetToday(); scheduleMidnightReset(); }, midnight - now);
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>

</body>
</html>
